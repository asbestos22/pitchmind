<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PitchMind — WC2026 Prediction Roaster</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚽</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --panel-dark:#0f0f0f;
  --panel-mid:#1a1a1a;
  --panel-light:#e8e8e8;
  --accent:#D4A017;
  --accent-soft:#E6AF2E;
  --text-muted:#6b6b6b;
  --glow:0 0 20px rgba(212,160,23,0.15),0 0 40px rgba(212,160,23,0.05);
  --glow-strong:0 0 20px rgba(212,160,23,0.3),0 0 60px rgba(212,160,23,0.1);
}
html,body{height:100%;background:var(--panel-dark);color:var(--panel-light);font-family:'Inter',system-ui,-apple-system,sans-serif;overflow:hidden}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;border-bottom:1px solid var(--panel-mid);box-shadow:var(--glow-strong);position:relative;z-index:10}
header .brand{display:flex;align-items:center;gap:12px}
header .logo-3d{width:36px;height:36px;flex-shrink:0}
header h1{font-size:15px;font-weight:900;letter-spacing:-0.02em;color:#fff;line-height:1}
header .sub{font-size:8px;font-weight:700;letter-spacing:0.2em;color:var(--text-muted);margin-top:2px}
header .meta{font-size:8px;font-weight:700;letter-spacing:0.15em;color:var(--accent)}
/* NAV */
nav{display:flex;border-bottom:1px solid var(--panel-mid)}
nav button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 0;font-size:10px;font-weight:700;letter-spacing:0.15em;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
nav button:hover{color:var(--panel-light);background:rgba(212,160,23,0.03)}
nav button.active{color:var(--accent-soft);border-bottom-color:var(--accent);background:rgba(212,160,23,0.08)}
nav button svg{width:14px;height:14px}
/* MAIN */
main{flex:1;overflow:hidden;position:relative}
.tab-panel{display:none;height:100%;flex-direction:column;overflow:hidden}
.tab-panel.active{display:flex}
/* FOOTER */
footer{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:32px;border-top:1px solid var(--panel-mid)}
footer span{font-size:8px;font-weight:700;letter-spacing:0.15em}
footer .left{color:var(--text-muted)}
footer .right{color:var(--accent)}
/* DATA PANEL */
.data-panel{background:rgba(212,160,23,0.05);border:1px solid var(--panel-mid)}
.glow-border{box-shadow:var(--glow);border:1px solid rgba(212,160,23,0.15)}
.glow-border-strong{box-shadow:var(--glow-strong);border:1px solid rgba(212,160,23,0.25)}
/* CARDS */
.card{background:var(--panel-mid);border:1px solid rgba(255,255,255,0.06);padding:12px 14px;transition:border-color .2s}
.card:hover{border-color:rgba(212,160,23,0.2)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-header .teams{font-size:12px;font-weight:700;color:#fff}
.card-header .pick{font-size:9px;font-weight:700;letter-spacing:0.1em;padding:2px 8px;border:1px solid}
.card-header .pick.HOME{color:#4ade80;border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.08)}
.card-header .pick.AWAY{color:#60a5fa;border-color:rgba(96,165,250,0.3);background:rgba(96,165,250,0.08)}
.card-header .pick.DRAW{color:var(--accent-soft);border-color:rgba(212,160,23,0.3);background:rgba(212,160,23,0.08)}
.card-meta{display:flex;align-items:center;gap:12px;font-size:9px;color:var(--text-muted);font-weight:600}
.card-meta .conf{color:var(--accent-soft)}
.card-meta .correct{color:#4ade80}
.card-meta .wrong{color:#ef4444}
.card-take{margin-top:6px;font-size:10px;color:var(--panel-light);font-style:italic;opacity:0.7}
/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--panel-mid);flex-shrink:0}
.filter-bar button{padding:4px 12px;font-size:9px;font-weight:700;letter-spacing:0.1em;border:1px solid var(--panel-mid);background:none;color:var(--text-muted);cursor:pointer;transition:all .15s}
.filter-bar button:hover{color:var(--panel-light)}
.filter-bar button.active{color:var(--accent-soft);border-color:var(--accent);background:rgba(212,160,23,0.1)}
.filter-bar .count{margin-left:auto;font-size:9px;font-weight:700;color:var(--text-muted)}
.find-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--panel-mid);flex-shrink:0}
.find-label{font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--text-muted)}
.find-bar select{flex:1;max-width:240px;padding:5px 10px;font-family:inherit;font-size:10px;font-weight:700;letter-spacing:0.08em;background:var(--panel-dark);color:var(--accent-soft);border:1px solid var(--panel-mid);cursor:pointer;text-transform:uppercase}
.find-bar select:focus{outline:none;border-color:var(--accent)}
/* SCROLLABLE */
.scroll-y{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.scroll-y::-webkit-scrollbar{width:4px}
.scroll-y::-webkit-scrollbar-track{background:transparent}
.scroll-y::-webkit-scrollbar-thumb{background:var(--panel-mid);border-radius:2px}
/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;font-size:10px;font-weight:700;color:var(--text-muted);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* ROAST */
.roast-box{padding:16px;flex-shrink:0}
.roast-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--accent);background:rgba(212,160,23,0.08);color:var(--accent-soft);font-size:10px;font-weight:700;letter-spacing:0.15em;cursor:pointer;transition:all .2s;width:100%;justify-content:center}
.roast-btn:hover{background:var(--accent);color:var(--panel-dark)}
.roast-btn svg{width:16px;height:16px}
.roast-text{margin-top:16px;padding:16px;white-space:pre-wrap;line-height:1.7;font-size:13px;color:var(--panel-light);border-left:3px solid var(--accent);background:rgba(212,160,23,0.04)}
.roast-blob{font-size:9px;color:var(--text-muted);margin-top:6px;word-break:break-all}
/* PICK TAB */
.pick-header{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--panel-mid);flex-shrink:0}
.pick-header .stat{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--panel-light)}
.pick-header .stat svg{width:10px;height:10px;color:var(--accent)}
.match-card{padding:12px 14px;cursor:pointer}
.match-card.selected{border-color:var(--accent);background:rgba(212,160,23,0.06)}
.match-card .vs{font-size:12px;font-weight:700;color:#fff}
.match-card .meta{font-size:9px;color:var(--text-muted);margin-top:4px}
.pick-buttons{display:flex;gap:6px;margin-top:10px}
.pick-buttons button{flex:1;padding:8px;font-size:9px;font-weight:700;letter-spacing:0.08em;border:1px solid var(--panel-mid);background:none;color:var(--text-muted);cursor:pointer;transition:all .15s}
.pick-buttons button:hover{border-color:var(--accent);color:var(--panel-light)}
.pick-buttons button.selected{border-color:var(--accent);color:var(--accent-soft);background:rgba(212,160,23,0.1)}
.conf-row{display:flex;align-items:center;gap:12px;margin-top:10px}
.conf-row label{font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:0.1em}
.conf-row input[type=range]{flex:1;accent-color:var(--accent)}
.conf-row .val{font-size:11px;font-weight:900;color:var(--accent-soft);min-width:30px;text-align:right}
.submit-pick{margin-top:12px;width:100%;padding:10px;border:1px solid var(--accent);background:rgba(212,160,23,0.1);color:var(--accent-soft);font-size:10px;font-weight:700;letter-spacing:0.15em;cursor:pointer;transition:all .2s}
.submit-pick:hover{background:var(--accent);color:var(--panel-dark)}
.submit-pick:disabled{opacity:0.3;cursor:not-allowed}
/* STATUS TAB */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 16px;flex-shrink:0}
.stat-card{padding:14px;text-align:center}
.stat-card .num{font-size:24px;font-weight:900;color:var(--accent-soft);line-height:1}
.stat-card .label{font-size:8px;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);margin-top:4px}
/* USER SELECTOR */
.user-select{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--panel-mid);flex-shrink:0}
.user-select button{padding:4px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;border:1px solid var(--panel-mid);background:none;color:var(--text-muted);cursor:pointer;transition:all .15s}
.user-select button:hover{color:var(--panel-light)}
.user-select button.active{color:var(--accent-soft);border-color:var(--accent);background:rgba(212,160,23,0.1)}
/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px}
.empty svg{width:24px;height:24px;color:var(--text-muted)}
.empty span{font-size:10px;font-weight:700;color:var(--text-muted)}
/* RESPONSIVE */
@media(max-width:480px){
  header h1{font-size:13px}
  header .sub{font-size:7px}
  nav button{font-size:9px;padding:10px 0}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <header>
    <div class="brand">
      <canvas id="logo3d" class="logo-3d" width="36" height="36"></canvas>
      <div>
        <h1>PITCHMIND</h1>
        <p class="sub">WORLD CUP PREDICTOR</p>
      </div>
    </div>
    <span class="meta">WC2026 // WALRUS MEMORY</span>
  </header>

  <!-- NAV -->
  <nav>
    <button class="active" data-tab="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48 0a6 6 0 010-8.49m11.31-2.82a10 10 0 010 14.14m-14.14 0a10 10 0 010-14.14"/></svg>
      FEED
    </button>
    <button data-tab="roast">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>
      ROAST
    </button>
    <button data-tab="newpick">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      NEW PICK
    </button>
    <button data-tab="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      STATUS
    </button>
  </nav>

  <!-- MAIN -->
  <main>
    <!-- FEED TAB -->
    <div class="tab-panel active" id="tab-feed">
      <div class="filter-bar">
        <button class="active" data-filter="all">ALL</button>
        <button data-filter="recent">RECENT</button>
        <span class="count" id="feed-count">0 PICKS</span>
      </div>
      <div class="find-bar" id="feed-find">
        <span class="find-label">FIND USER</span>
        <select id="feed-find-user"><option value="">EVERYONE</option></select>
      </div>
      <div class="scroll-y" id="feed-list">
        <div class="loading">LOADING PREDICTIONS...</div>
      </div>
    </div>

    <!-- ROAST TAB -->
    <div class="tab-panel" id="tab-roast">
      <div class="user-select" id="roast-users"></div>
      <div class="roast-box">
        <button class="roast-btn" id="roast-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>
          ROAST ME
        </button>
      </div>
      <div class="scroll-y" id="roast-content">
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>
          <span>PRESS ROAST ME TO GET BURNED</span>
        </div>
      </div>
    </div>

    <!-- NEW PICK TAB -->
    <div class="tab-panel" id="tab-newpick">
      <div class="pick-header">
        <div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span id="pick-match-count">72 MATCHES</span></div>
      </div>
      <div class="scroll-y" id="match-list"></div>
      <div id="pick-form" style="display:none;padding:12px 16px;border-top:1px solid var(--panel-mid);flex-shrink:0">
        <div id="pick-match-name" style="font-size:12px;font-weight:700;color:#fff;margin-bottom:10px"></div>
        <div class="pick-buttons" id="pick-buttons"></div>
        <div class="conf-row">
          <label>CONFIDENCE</label>
          <input type="range" id="conf-slider" min="10" max="99" value="70">
          <span class="val" id="conf-val">70%</span>
        </div>
        <input type="text" id="take-input" placeholder="Hot take (optional)" style="width:100%;margin-top:8px;padding:8px;border:1px solid var(--panel-mid);background:rgba(212,160,23,0.05);color:var(--panel-light);font-size:10px;outline:none">
        <button class="submit-pick" id="submit-pick">SUBMIT PREDICTION</button>
      </div>
    </div>

    <!-- STATUS TAB -->
    <div class="tab-panel" id="tab-status">
      <div class="user-select" id="status-users"></div>
      <div id="status-loading" class="loading" style="font-size:14px;padding:20px 0 10px;line-height:1.3;flex-shrink:0;height:auto">RECALLING FROM WALRUS...<br><span style="font-size:11px;color:var(--text-muted);animation:none">Querying onchain memory - may take 20-40s</span></div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card data-panel glow-border"><div class="num" id="stat-total">-</div><div class="label">TOTAL PICKS</div></div>
        <div class="stat-card data-panel glow-border"><div class="num" id="stat-correct">-</div><div class="label">CORRECT</div></div>
        <div class="stat-card data-panel glow-border"><div class="num" id="stat-accuracy">-</div><div class="label">ACCURACY</div></div>
        <div class="stat-card data-panel glow-border"><div class="num" id="stat-conf">-</div><div class="label">AVG CONFIDENCE</div></div>
      </div>
      <div class="scroll-y" id="team-stats"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span class="left">WC 2026 // LIVE DATA</span>
    <span class="right">PITCHMIND v0.2.0</span>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="app.js?v=6"></script>
</body>
</html>
