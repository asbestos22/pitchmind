<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitchMind</title>
<link rel="icon" type="image/png" href="data:image/png;base64,">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --surface2:#181818;
  --border:#252525;
  --text:#d4d4d4;
  --dim:#666;
  --bright:#fff;
  --yellow:#FFD000;
  --yellow-dim:#B89500;
  --yellow-bg:rgba(255,208,0,.08);
  --yellow-border:rgba(255,208,0,.25);
  --red:#D32F2F;
  --green:#2E7D32;
  --mono:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;
}

html{font-size:15px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* ── NAV ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:52px;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.topbar .brand{
  display:flex;align-items:center;gap:10px;
}
.topbar .brand img{
  width:28px;height:28px;
}
.topbar .brand-text{
  font-family:var(--mono);font-size:.75rem;font-weight:700;
  color:var(--yellow);text-transform:uppercase;letter-spacing:3px;
}
.topbar .meta{
  font-family:var(--mono);font-size:.6rem;color:var(--dim);
  letter-spacing:1px;
}

/* ── TABS ── */
.nav-tabs{
  display:flex;gap:0;border-bottom:1px solid var(--border);
  background:var(--surface);padding:0 24px;
}
.nav-tab{
  padding:12px 20px;font-family:var(--mono);font-size:.7rem;
  text-transform:uppercase;letter-spacing:2px;color:var(--dim);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}

/* ── MAIN ── */
.main{max-width:920px;margin:0 auto;padding:24px}
.panel{display:none}.panel.active{display:block}

/* ── SECTION HEADERS ── */
.section-head{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);
}
.section-head h2{
  font-family:var(--mono);font-size:.78rem;font-weight:600;
  text-transform:uppercase;letter-spacing:2px;color:var(--yellow);
}
.section-head .count{
  font-family:var(--mono);font-size:.62rem;color:var(--dim);
}

/* ── STATS ROW ── */
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border:1px solid var(--border);margin-bottom:24px;
}
.stat-cell{
  background:var(--surface);padding:14px 16px;text-align:center;
}
.stat-cell .label{font-family:var(--mono);font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.stat-cell .value{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--bright)}
.stat-cell .value.yellow{color:var(--yellow)}
.stat-cell .value.green{color:var(--green)}
.stat-cell .value.red{color:var(--red)}

/* ── PREDICTION FEED ── */
.pred-feed{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border)}
.pred-row{
  display:grid;grid-template-columns:1fr auto auto auto;
  align-items:center;gap:16px;
  padding:14px 16px;background:var(--surface);
  font-family:var(--mono);font-size:.76rem;
  transition:background .15s;
}
.pred-row:hover{background:var(--surface2)}
.pred-row .match{color:var(--bright);font-weight:600}
.pred-row .vs{color:var(--dim);font-weight:400}
.pred-row .pick{
  font-size:.62rem;font-weight:700;text-transform:uppercase;
  padding:3px 10px;letter-spacing:1px;
}
.pred-row .pick.HOME{background:rgba(46,125,50,.15);color:var(--green)}
.pred-row .pick.AWAY{background:rgba(211,47,47,.15);color:var(--red)}
.pred-row .pick.DRAW{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.pred-row .conf{color:var(--dim);font-size:.68rem;min-width:36px;text-align:right}
.pred-row .status{font-size:.68rem;min-width:20px;text-align:center}

/* ── ROAST ── */
.roast-area{
  background:var(--surface);border:1px solid var(--border);
  padding:32px 24px;min-height:200px;
}
.roast-area .label{
  font-family:var(--mono);font-size:.62rem;font-weight:700;
  color:var(--yellow);text-transform:uppercase;letter-spacing:3px;
  margin-bottom:16px;
}
.roast-text{
  font-family:var(--sans);font-size:1.05rem;line-height:1.8;
  color:var(--text);
}
.roast-text .word{opacity:0;transition:opacity .2s}
.roast-text .word.visible{opacity:1}
.roast-cursor{
  display:inline-block;width:2px;height:1em;background:var(--yellow);
  animation:blink-cursor .6s step-end infinite;vertical-align:text-bottom;
  margin-left:2px;
}
@keyframes blink-cursor{50%{opacity:0}}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{
  font-family:var(--mono);font-size:.58rem;font-weight:600;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);
}
.form-group input,.form-group select,.form-group textarea{
  background:var(--bg);border:1px solid var(--border);
  padding:10px 12px;color:var(--text);font-family:var(--mono);
  font-size:.82rem;outline:none;transition:border-color .15s;
  -webkit-appearance:none;border-radius:0;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--yellow);
}
.form-group textarea{resize:vertical;min-height:64px;font-family:var(--sans)}
.form-group select{cursor:pointer}

/* Range slider */
.slider-row{display:flex;align-items:center;gap:12px}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;background:var(--border);outline:none;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  background:var(--yellow);cursor:pointer;border-radius:0;
}
.slider-val{font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--yellow);min-width:44px}

/* Buttons */
.btn{
  font-family:var(--mono);font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;
  padding:12px 24px;border:none;cursor:pointer;
  transition:background .15s,opacity .15s;
  border-radius:0;
}
.btn-primary{background:var(--yellow);color:#000}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}
.btn-outline{
  background:transparent;color:var(--yellow);
  border:1px solid var(--yellow-border);
}
.btn-outline:hover{background:var(--yellow-bg)}
.btn-outline:disabled{opacity:.3;cursor:not-allowed}

/* ── HEALTH ── */
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border)}
.health-cell{background:var(--surface);padding:14px 16px}
.health-cell .k{font-family:var(--mono);font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.health-cell .v{font-family:var(--mono);font-size:.8rem;color:var(--bright);word-break:break-all}
.health-cell .v.ok{color:var(--green)}

/* ── TOAST ── */
#toasts{position:fixed;top:60px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px}
.toast{
  font-family:var(--mono);font-size:.7rem;padding:10px 16px;
  animation:slide-in .25s ease;
}
.toast.success{background:rgba(46,125,50,.12);color:var(--green);border-left:3px solid var(--green)}
.toast.error{background:rgba(211,47,47,.12);color:var(--red);border-left:3px solid var(--red)}
.toast.info{background:var(--yellow-bg);color:var(--yellow);border-left:3px solid var(--yellow)}
@keyframes slide-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── LOADING ── */
.loading{padding:40px;text-align:center;font-family:var(--mono);font-size:.72rem;color:var(--dim)}
.loading::after{content:'...';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* ── EMPTY ── */
.empty-state{
  padding:48px 24px;text-align:center;
  font-family:var(--mono);font-size:.76rem;color:var(--dim);
}
.empty-state strong{color:var(--yellow)}

/* ── RAW DATA ── */
.raw-toggle{
  font-family:var(--mono);font-size:.62rem;color:var(--dim);
  cursor:pointer;margin-top:16px;
}
.raw-toggle:hover{color:var(--text)}
.raw-data{
  display:none;margin-top:8px;padding:12px;
  background:var(--bg);border:1px solid var(--border);
  font-family:var(--mono);font-size:.68rem;color:var(--dim);
  white-space:pre-wrap;word-break:break-all;
  max-height:200px;overflow:auto;line-height:1.6;
}
.raw-data.open{display:block}

/* ── FOOTER ── */
.footer{
  margin-top:48px;padding:16px 24px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:.58rem;color:var(--dim);
}
.footer .walrus{
  display:flex;align-items:center;gap:6px;
  color:var(--yellow-dim);
}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .stats-row{grid-template-columns:1fr 1fr}
  .pred-row{grid-template-columns:1fr;gap:8px}
  .form-grid{grid-template-columns:1fr}
  .health-grid{grid-template-columns:1fr}
  .nav-tab{padding:10px 12px;font-size:.62rem;letter-spacing:1px}
  .footer{flex-direction:column;gap:8px;text-align:center}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23FFD000'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%230A0A0A'/%3E%3Ccircle cx='32' cy='20' r='4' fill='%230A0A0A'/%3E%3Ccircle cx='22' cy='32' r='4' fill='%230A0A0A'/%3E%3Ccircle cx='42' cy='32' r='4' fill='%230A0A0A'/%3E%3C/svg%3E" alt="PM">
    <span class="brand-text">PitchMind</span>
  </div>
  <span class="meta">WC2026 // WALRUS MEMORY</span>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" data-panel="predictions">Feed</div>
  <div class="nav-tab" data-panel="roast">Roast</div>
  <div class="nav-tab" data-panel="submit">New Pick</div>
  <div class="nav-tab" data-panel="health">Status</div>
</div>

<div class="main">

  <!-- FEED -->
  <div id="predictions" class="panel active">
    <div class="section-head">
      <h2>Prediction Feed</h2>
      <span class="count" id="pred-count"></span>
    </div>
    <div id="pred-stats"></div>
    <div id="pred-list"><div class="loading">loading predictions</div></div>
  </div>

  <!-- ROAST -->
  <div id="roast" class="panel">
    <div class="section-head">
      <h2>Roast Generator</h2>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:20px">
      <input id="roast-user" type="text" placeholder="username" style="flex:1;background:var(--bg);border:1px solid var(--border);padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:.82rem;outline:none;border-radius:0">
      <button id="roastBtn" class="btn btn-outline" onclick="doRoast()">ROAST</button>
    </div>
    <div id="roast-output" class="roast-area">
      <div class="label">output</div>
      <div class="roast-text" style="color:var(--dim);font-style:italic">enter a username and hit roast</div>
    </div>
    <div id="roast-raw" style="display:none">
      <div class="raw-toggle" onclick="this.nextElementSibling.classList.toggle('open')">[ toggle raw json ]</div>
      <div class="raw-data" id="roast-raw-data"></div>
    </div>
  </div>

  <!-- NEW PICK -->
  <div id="submit" class="panel">
    <div class="section-head">
      <h2>Submit Prediction</h2>
    </div>
    <form id="pred-form">
      <div class="form-grid">
        <div class="form-group">
          <label>Your Name</label>
          <input name="user" placeholder="e.g. F5" required>
        </div>
        <div class="form-group">
          <label>Match ID</label>
          <input name="matchId" placeholder="e.g. FRA-BRA" required>
        </div>
        <div class="form-group">
          <label>Home Team</label>
          <input name="home" placeholder="e.g. France" required>
        </div>
        <div class="form-group">
          <label>Away Team</label>
          <input name="away" placeholder="e.g. Brazil" required>
        </div>
        <div class="form-group">
          <label>Pick</label>
          <select name="pick" required>
            <option value="">-- select --</option>
            <option value="HOME">Home Win</option>
            <option value="AWAY">Away Win</option>
            <option value="DRAW">Draw</option>
          </select>
        </div>
        <div class="form-group">
          <label>Confidence</label>
          <div class="slider-row">
            <input type="range" id="confSlider" name="confidence" min="0" max="100" value="70">
            <span class="slider-val" id="confVal">70%</span>
          </div>
        </div>
        <div class="form-group form-full">
          <label>Hot Take (optional)</label>
          <textarea name="take" rows="2" placeholder="your prediction reasoning..."></textarea>
        </div>
        <div class="form-group form-full">
          <button type="submit" id="submitBtn" class="btn btn-primary">SUBMIT TO WALRUS</button>
        </div>
      </div>
    </form>
  </div>

  <!-- STATUS -->
  <div id="health" class="panel">
    <div class="section-head">
      <h2>Service Status</h2>
    </div>
    <div id="health-content"><div class="loading">pinging relay</div></div>
  </div>

</div>

<div class="footer">
  <span>pitchmind v0.1.0</span>
  <span class="walrus">walrus memory // decentralized prediction storage</span>
</div>

<div id="toasts"></div>

<script src="/app.js?v=3"></script>
</body>
</html>
